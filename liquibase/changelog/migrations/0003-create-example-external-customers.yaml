databaseChangeLog:
  - changeSet:
      id: 0003-create-example-external-customers
      author: codex
      changes:
        - sql:
            splitStatements: false
            sql: |
              DROP EXTERNAL TABLE IF EXISTS ext.example_customers_raw;

              CREATE EXTERNAL TABLE ext.example_customers_raw (
                  customer_id text,
                  full_name text,
                  email text,
                  created_at text
              )
              LOCATION ('gpfdist://gpfdist:8081/example_customers/*.csv')
              FORMAT 'CSV' (
                  HEADER
                  DELIMITER ','
                  NULL ''
                  QUOTE '"'
              )
              ENCODING 'UTF8'
              LOG ERRORS
              SEGMENT REJECT LIMIT 100 ROWS;

        - sql:
            splitStatements: false
            sql: |
              CREATE TABLE IF NOT EXISTS stg.example_customers (
                  customer_id bigint,
                  full_name text,
                  email text,
                  created_at timestamp
              )
              DISTRIBUTED BY (customer_id);
